services:
  db:
    image: postgres:16
    container_name: zivara_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - zivara_db_data:/var/lib/postgresql/data

volumes:
  zivara_db_data: